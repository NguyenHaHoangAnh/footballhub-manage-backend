server:
  port: 8089

spring:
  application:
    name: footballhub-manage-backend
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 100
      minimum-idle: 1
      idle-timeout: 300000
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 256
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
      schema: football
    url: jdbc:postgresql://localhost:5432/footballhub?currentSchema=football&charSet=UTF8
    username: footballhub
    password: footballhub
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

link:
  url:
    football-data-api: https://api.football-data.org/v4

football-data-api:
  x-auth-token: 453edd7035a845e9ba771641a9d56478

auth:
  token-url: http://localhost:8080/api/v1/auth/token
  permit-urls:
    - /api/v1/admin/public/**
  login-url: http://localhost:8080/api/v1/login